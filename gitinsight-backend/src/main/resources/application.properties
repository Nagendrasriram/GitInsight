# 3A. PRIMARY AI (OpenRouter mimicking OpenAI)
spring.ai.openai.base-url=https://openrouter.ai/api
# Change line 58 and 59 to placeholders like this:
openrouter.api.key.primary=${OPENROUTER_API_KEY}
openrouter.api.key.backup=${OPENROUTER_BACKEND_KEY}

# Add as many keys as you have — Spring injects them as List<String>.
# The service rotates through them round-robin and skips failed keys.
#
## OpenRouter's OpenAI-compatible base URL (do not change unless they migrate).
#openrouter.base-url=https://openrouter.ai/api/v1

# Any model slug supported by OpenRouter.
# Swap here without recompiling — no Java changes required.
#   Budget / fast  : openai/gpt-4o-mini
#   Quality        : openai/gpt-4o
#   Free tier      : mistralai/mistral-7b-instruct:free
#   Google via OR  : google/gemini-2.0-flash-exp:free
#openrouter.model=openai/gpt-4o-mini

spring.ai.openai.chat.options.model=google/gemini-2.5-flash
