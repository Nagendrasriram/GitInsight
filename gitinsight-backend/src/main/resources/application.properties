spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


# ==========================================
# 2. VECTOR DATABASE (PGVector)
# ==========================================
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
# Change this from 1536 to 1024 for Mistral Embeddings
spring.ai.vectorstore.pgvector.dimensions=1024
spring.ai.vectorstore.pgvector.initialize-schema=false
spring.ai.vectorstore.pgvector.table-name=codebase_vectors

# ==========================================
# 3. AI ORCHESTRATION & EMBEDDINGS
# ==========================================

# TIER 1: OPENROUTER (Failover Pool — managed manually in AiOrchestrationService & AiConfig)
openrouter.api.key=${OPENROUTER_API_KEY}
gcp.api.key=${GCP_API_KEY}
openrouter.base-url=https://openrouter.ai/api
openrouter.model=openai/gpt-4o-mini

# Disable OpenAI autoconfiguration entirely — we build OpenAiChatModel manually via OpenRouter
# Disable ALL OpenAI autoconfiguration (we use OpenRouter manually)
spring.ai.openai.chat.enabled=false
spring.ai.openai.embedding.enabled=false
spring.ai.openai.audio.transcription.enabled=false
spring.ai.openai.image.enabled=false
spring.ai.openai.audio.speech.enabled=false
# TIER 2: GOOGLE GEMINI (Fallback 1)
spring.ai.google.genai.chat.options.model=gemini-2.5-flash

# TIER 3: MISTRAL AI (Fallback 2 + Embeddings)
spring.ai.mistralai.chat.options.model=mistral-small-latest
spring.ai.mistralai.embedding.enabled=true
spring.ai.mistralai.embedding.options.model=mistral-embed


